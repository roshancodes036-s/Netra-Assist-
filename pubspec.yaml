name: myapp
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0

  # Fonts & State Management
  google_fonts: ^6.1.0
  provider: ^6.1.2

  # 🌐 Network & AI
  http: ^1.2.0
  google_generative_ai: ^0.4.7

  # 🔥 Firebase (STABLE – SDK 34 compatible)
  firebase_core: 2.32.0
  cloud_firestore: 4.17.5

  # 🎤 Voice, Files & Camera
  flutter_tts: ^3.8.3
  speech_to_text: ^7.3.0
  file_picker: ^8.0.0
  permission_handler: ^11.3.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/orb.gif
