name: myapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8
  lucide_icons: ^0.257.0

  # Fonts & State Management
  google_fonts: ^6.1.0
  provider: ^6.1.2

  # Network & AI
  http: ^1.2.0
  google_generative_ai: ^0.4.7

  # Firebase
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0

  # Voice, Files & Utilities
  flutter_tts: ^3.8.3
  speech_to_text: ^7.3.0
  file_picker: ^10.3.8
  permission_handler: ^11.0.1
  image_picker: ^1.0.4
  path_provider: ^2.1.2
  path: ^1.9.0
  camera: ^0.10.5
  syncfusion_flutter_pdf: ^32.1.23
  url_launcher: ^6.2.1
  archive: ^3.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/orb.gif
