name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Java 17 (Standard)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      # यहाँ हमने बदलाव किया है: हम जानबूझकर Gradle 8.0 मांग रहे हैं
      # यह वर्ज़न पुराने प्लगइन्स (जैसे speech_to_text) के साथ भी प्यार से काम करता है
      - name: Generate Compatible Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.2 --distribution-type all
          chmod +x gradlew

      - name: Build APK (Debug)
        run: flutter build apk --debug --no-sound-null-safety

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: codenetra-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
