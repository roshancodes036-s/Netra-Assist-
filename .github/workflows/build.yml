name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      # यह है असली जादू (Magic Fix)
      # यह कमांड गायब हुई फाइलों (जैसे gradlew) को दोबारा बना देगी
      - name: Repair Project Structure
        run: flutter create .

      - name: Build APK (Debug)
        run: flutter build apk --debug --no-sound-null-safety

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: codenetra-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
